name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - run: pip install -r requirements.txt

      - run: ruff check .

      - run: ruff format --check .

      - run: mypy app

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: groundtruth_test
          POSTGRES_USER: groundtruth
          POSTGRES_PASSWORD: groundtruth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U groundtruth"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://groundtruth:groundtruth_test@localhost:5432/groundtruth_test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: groundtruth_test
      DATABASE_USER: groundtruth
      DATABASE_PASSWORD: groundtruth_test
      OPENAI_API_KEY: sk-test-ci-dummy-key
      APP_ENV: test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - run: pip install -r requirements.txt

      - run: python -m pytest --cov=app --cov-report=xml --cov-report=term-missing -v

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: node-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: node-${{ runner.os }}-

      - run: npm ci

      - run: npx next lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: node-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: node-${{ runner.os }}-

      - run: npm ci

      - run: npx next build

  docker-build:
    name: Docker Build Verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build API image
        run: docker build -t groundtruth-api ./backend

      - name: Build Web image
        run: docker build -t groundtruth-web ./frontend
